name: CI Pipeline
on: [push, pull_request]

jobs:
  build:
    runs-on: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: macos-14, go: '1.26' }
          - { image: ubuntu-24.04, go: '1.26', apt: libgtk-4-dev libwebkitgtk-6.0-dev, tags: webkitgtk_60 }
          - { image: ubuntu-24.04, go: '1.26', apt: libgtk-3-dev libwebkit2gtk-4.1-dev, tags: webkitgtk_41 }
          - { image: windows-2022, go: '1.26' }
    name: Build (${{ matrix.image }}, go ${{ matrix.go }})
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.apt }}
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - name: Resolve build tags
        shell: bash
        run: |
          if [ -n "${{ matrix.tags }}" ]; then
            echo "GO_BUILD_TAGS=-tags ${{ matrix.tags }}" >> "$GITHUB_ENV"
          else
            echo "GO_BUILD_TAGS=" >> "$GITHUB_ENV"
          fi
      - name: Build examples
        shell: bash
        run: |
          go build $GO_BUILD_TAGS ./examples/basic
          go build $GO_BUILD_TAGS ./examples/bind
      - name: Build package
        shell: bash
        run: go build $GO_BUILD_TAGS ./...
      - name: Run tests
        shell: bash
        run: go test $GO_BUILD_TAGS ./...

  windows-gnu-cross:
    runs-on: ubuntu-24.04
    name: Build (ubuntu-24.04, Go 1.26, windows GNU cross)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Install zig
        run: sudo apt-get update && sudo apt-get install -y zig
      - name: Cross-build Windows targets with zig
        env:
          GOOS: windows
          GOARCH: amd64
          CGO_ENABLED: '1'
          CC: zig cc -target x86_64-windows-gnu
          CXX: zig c++ -target x86_64-windows-gnu
        run: |
          go build ./...
          go build ./examples/basic
